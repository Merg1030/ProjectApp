<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Add Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-analytics.js"></script>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penta Construction Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: url('Photos/CANVA.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    .login-container {
      background: rgba(8, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 300px;
    }
    .login {
      display: block;
      margin: 0 auto 20px;
      width: 150px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .password-container { position: relative; }
    .password-container input { padding-right: 40px; }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2em;
      color: #ccc;
    }
    .warning {
      color: red;
      margin-top: 10px;
      display: none;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      font-size: 1em;
      cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
    .penta { color: white; }
  </style>

  <!-- Firebase SDK + Login Logic (using module to keep imports) -->
  <script type="module">
    // Initialize Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",
      authDomain: "project-app-58ff6.firebaseapp.com",
      databaseURL: "https://project-app-58ff6-default-rtdb.firebaseio.com",
      projectId: "project-app-58ff6",
      storageBucket: "project-app-58ff6.appspot.com",
      messagingSenderId: "586923989952",
      appId: "1:586923989952:web:72b300dbc00d830e2e4625",
      measurementId: "G-HV80KTBWSR"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const analytics = getAnalytics(app);

    // Helper: Save login attempt to Firebase
    function saveLoginAttempt(username, method) {
      const loginRef = ref(database, 'loginAttempts');
      push(loginRef, {
        username: username,
        timestamp: new Date().toISOString(),
        method: method
      }).catch(err => console.warn("Firebase push failed", err));
    }

    // Main login function (exposed globally for onclick)
    window.login = async function() {
      const usernameRaw = document.getElementById("username").value.trim();
      const username = usernameRaw.toLowerCase();  // normalize for case-insensitive matching except special names later
      const password = document.getElementById("password").value;
      const warningMessage = document.getElementById("warningMessage");
      
      // Hide any previous warning
      warningMessage.style.display = "none";

      // --- NEW USER: kaunda (username case-insensitive but stored as 'kaunda') ---
      // Username: "kaunda" (any case, e.g., Kaunda, KAUNDA) and password: "kay@hazida"
      if (username === "kaunda" && password === "kay@hazida") {
        saveLoginAttempt(username, "kaunda-dashboard");
        // Store user info (optional, but we store the exact original name)
        localStorage.setItem('currentUser', 'kaunda');
        // Redirect to cleandashboard.html as requested
        window.location.href = 'cleandashboard.html';
        return;
      }

      // --- PMP user login: routes to Ex-pdashboard.html ---
      if (username === "pmp" && password === "123454321") {
        saveLoginAttempt(username, "pmp");
        localStorage.setItem('currentUser', 'pmp');
        window.location.href = 'Ex-pdashboard.html';
        return;
      }

      // --- Shared global account: "penta" / "12345" -> assessment.html ---
      if (username === "penta" && password === "12345") {
        saveLoginAttempt(username, "shared-account");
        localStorage.setItem('currentUser', 'penta');
        window.location.href = 'assessment.html';
        return;
      }

      // --- Assessment individual users list (all use password "12345") ---
      const assessmentUsers = [
        "brighton matolokosh", "caphas tembo", "clisha mambilima", "dabson daka",
        "danny mvula", "james daka", "joseph tembo", "luckson phiri", "micheal lobela",
        "obert siame", "dominic sakala", "peter mawere", "saviour phiri", "tembeya sakala", "kelvin siame"
      ];
      
      if (assessmentUsers.includes(username) && password === "12345") {
        saveLoginAttempt(username, "individual-assessment");
        localStorage.setItem('currentUser', username);
        window.location.href = 'assessment.html';
        return;
      }

      // --- Admin / dashboard users (original admins) ---
      // Important: Since we changed username to lower case for checks, we need to handle "faiyaz mulla" and "chishela" as exact original casing? 
      // But the input raw is already trimmed, but for safety we compare original raw lowercased? 
      // However admin's original username strings have spaces and lowercasing them is fine. 
      // The password for both is "PENTACON". Let's keep robust comparison using lowercased but preserve original for localStorage if needed.
      // Passwords are case-sensitive (PENTACON).
      if ((username === "faiyaz mulla" && password === "PENTACON") || 
          (username === "chishela" && password === "PENTACON")) {
        saveLoginAttempt(username, "admin");
        localStorage.setItem('currentUser', username);
        window.location.href = 'dashboard.html';
        return;
      }

      // If none matched, show warning
      warningMessage.style.display = "block";
    };

    // Password visibility toggle (global function)
    window.togglePasswordVisibility = function() {
      const passwordField = document.getElementById("password");
      const toggleIcon = document.getElementById("togglePasswordIcon");

      if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleIcon.textContent = "🙈";
      } else {
        passwordField.type = "password";
        toggleIcon.textContent = "👁";
      }
    };
  </script>
</head>

<body>
  <div class="login-container">
    <img class="login" src="Photos/logo.png" alt="Penta Construction Logo">
    <p class="penta">PENTA CONSTRUCTION</p>
    <input type="text" id="username" placeholder="User Name">
    <div class="password-container">
      <input type="password" id="password" placeholder="Password">
      <span class="toggle-password" id="togglePasswordIcon" onclick="togglePasswordVisibility()">👁</span>
    </div>
    <p class="warning" id="warningMessage">Invalid username or password. Please try again.</p>
    <button onclick="login()">Login</button>
  </div>
</body>
</html>

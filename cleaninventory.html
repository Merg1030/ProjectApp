<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg:#f4f5f7;--white:#fff;--accent:#f59e0b;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--r:12px;--green:#16a34a;--gbg:#dcfce7;--yellow:#d97706;--ybg:#fef3c7;--red:#dc2626;--rbg:#fee2e2;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);padding:24px;color:var(--text);}

    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
    h2{font-size:1.2rem;font-weight:600;}
    h2 span{color:var(--muted);font-weight:400;font-size:0.95rem;margin-left:6px;}

    .btn-group{display:flex;gap:8px;flex-wrap:wrap;}
    .btn{border:none;padding:9px 18px;border-radius:40px;font-weight:600;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:0.15s;}
    .btn-accent{background:var(--accent);}  .btn-accent:hover{filter:brightness(0.92);}
    .btn-dark{background:#111827;color:#fff;}  .btn-dark:hover{background:#1f2937;}
    .btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text);}  .btn-outline:hover{background:var(--bg);}
    .btn-green{background:#16a34a;color:#fff;}  .btn-green:hover{filter:brightness(0.92);}
    .btn-sm{padding:6px 12px;font-size:0.78rem;}

    .stats-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .stat-pill{background:var(--white);border:1px solid var(--border);border-radius:40px;padding:6px 14px;font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .stat-pill strong{color:var(--text);}

    /* Modal overlay */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:var(--r);padding:24px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.12);margin:16px;}
    .modal-title{font-size:1rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
    .form-group label{font-size:0.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .form-group input,.form-group select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;outline:none;transition:0.15s;background:white;}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

    /* Table */
    .table-wrap{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:#f9fafb;}
    th{padding:11px 14px;text-align:left;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
    td{padding:12px 14px;font-size:0.88rem;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:#fafafa;}

    .item-name{font-weight:500;display:flex;align-items:center;gap:8px;}
    .item-icon{width:28px;height:28px;background:var(--bg);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.78rem;flex-shrink:0;}

    .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:40px;font-size:0.72rem;font-weight:600;}
    .bg{background:var(--gbg);color:var(--green);}
    .bl{background:var(--ybg);color:var(--yellow);}
    .bc{background:var(--rbg);color:var(--red);}

    .action-btns{display:flex;gap:5px;}
    .icon-btn{background:none;border:1px solid var(--border);width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75rem;transition:0.15s;}
    .icon-btn:hover{border-color:#111827;background:#f3f4f6;}
    .icon-btn.edit:hover{border-color:#111827;color:#111827;}
    .icon-btn.assign{color:#3b82f6;border-color:#bfdbfe;} .icon-btn.assign:hover{background:#eff6ff;}
    .icon-btn.restock{color:var(--green);border-color:#bbf7d0;} .icon-btn.restock:hover{background:var(--gbg);}
    .icon-btn.del{color:var(--red);border-color:#fecaca;} .icon-btn.del:hover{background:var(--rbg);}

    .empty-state{padding:44px;text-align:center;color:var(--muted);}
    .empty-state i{font-size:1.8rem;margin-bottom:8px;opacity:0.25;display:block;}

    /* Assign list inside modal */
    .assign-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
    .assign-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f3f4f6;font-size:0.88rem;}
    .assign-row:last-child{border-bottom:none;}
    .assign-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);}

    .error-msg{color:#dc2626;font-size:0.8rem;margin-top:4px;display:none;}
    .error-msg.show{display:block;}

    @media(max-width:600px){body{padding:14px;}th,td{padding:9px 10px;}.form-row-2{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<div class="page-header">
  <h2>Inventory <span>Cleaning Materials</span></h2>
  <div class="btn-group">
    <button class="btn btn-accent" id="addBtn"><i class="fas fa-plus"></i> Add Item</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-pill"><i class="fas fa-boxes"></i> Total: <strong id="statTotal">—</strong></div>
  <div class="stat-pill"><i class="fas fa-exclamation-triangle" style="color:#d97706"></i> Low: <strong id="statLow">—</strong></div>
  <div class="stat-pill"><i class="fas fa-times-circle" style="color:#dc2626"></i> Critical: <strong id="statCrit">—</strong></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Item</th><th>Qty</th><th>Unit</th><th>Status</th><th>Assigned To</th><th>Actions</th></tr>
    </thead>
    <tbody id="invBody">
      <tr><td colspan="6" class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-box-open" style="color:var(--accent)"></i> <span id="modalTitle">Add Item</span></div>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="fName" placeholder="e.g. Floor Cleaner">
      <div class="error-msg" id="errName">Item name is required</div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="fQty" placeholder="0" min="1" step="1">
        <div class="error-msg" id="errQty">Quantity must be greater than 0</div>
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input type="text" id="fUnit" placeholder="pcs / litres / kg">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="itemCancel">Cancel</button>
      <button class="btn btn-dark" id="itemSave"><i class="fas fa-check"></i> Save</button>
    </div>
  </div>
</div>

<!-- RESTOCK MODAL -->
<div class="modal-overlay" id="restockModal">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-truck" style="color:var(--green)"></i> Restock — <span id="restockItemName"></span></div>
    <div class="form-group">
      <label>Supplier</label>
      <input type="text" id="rSupplier" placeholder="e.g. ABC Supplies">
      <div class="error-msg" id="errSupplier">Supplier name is required</div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Qty to Add</label>
        <input type="number" id="rQty" placeholder="0" min="1" step="1">
        <div class="error-msg" id="errRQty">Quantity must be greater than 0</div>
      </div>
      <div class="form-group">
        <label>Price (ZMW)</label>
        <input type="number" id="rPrice" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-group"><label>Date</label><input type="date" id="rDate"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="restockCancel">Cancel</button>
      <button class="btn btn-green" id="restockSave"><i class="fas fa-check"></i> Restock</button>
    </div>
  </div>
</div>

<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="assignModal">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-user-tag" style="color:#3b82f6"></i> Assign — <span id="assignItemName"></span></div>
    <div class="form-group"><label>Select Users to Assign</label></div>
    <div class="assign-list" id="assignList">Loading users...</div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Qty to Assign</label>
        <input type="number" id="aQty" placeholder="0" min="1" step="1">
        <div class="error-msg" id="errAQty">Quantity must be greater than 0</div>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="aDate"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="assignCancel">Cancel</button>
      <button class="btn" style="background:#3b82f6;color:#fff;" id="assignSave"><i class="fas fa-check"></i> Assign</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const cfg = {
    apiKey:"AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",
    authDomain:"project-app-58ff6.firebaseapp.com",
    databaseURL:"https://project-app-58ff6-default-rtdb.firebaseio.com",
    projectId:"project-app-58ff6",
    storageBucket:"project-app-58ff6.appspot.com",
    messagingSenderId:"586923989952",
    appId:"1:586923989952:web:72b300dbc00d830e2e4625"
  };
  
  let app, db, invRef;
  let editId = null;
  let restockId = null;
  let assignId  = null;
  let allItems  = [];

  function esc(s){ if(!s)return''; return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
  }

  function showError(elementId) {
    const elem = document.getElementById(elementId);
    if(elem) elem.classList.add('show');
  }

  // Initialize Firebase
  try {
    app = initializeApp(cfg);
    db = getDatabase(app);
    invRef = ref(db, 'cleaningInventory');
    console.log('Firebase initialized successfully');
  } catch(err) {
    console.error('Firebase initialization error:', err);
    alert('Error initializing database. Check console for details.');
  }

  // ── LIVE INVENTORY ──
  onValue(invRef, snap => {
    try {
      const data = snap.val();
      allItems = data ? Object.entries(data).map(([id,v])=>({id,...v})) : [];

      document.getElementById('statTotal').textContent = allItems.length;
      document.getElementById('statLow').textContent   = allItems.filter(i=>Number(i.quantity)<50&&Number(i.quantity)>=20).length;
      document.getElementById('statCrit').textContent  = allItems.filter(i=>Number(i.quantity)<20).length;

      const tbody = document.getElementById('invBody');
      if(!allItems.length){
        tbody.innerHTML=`<tr><td colspan="6" class="empty-state"><i class="fas fa-box-open"></i>No items yet — click "Add Item"</td></tr>`;
        return;
      }
      tbody.innerHTML='';
      allItems.forEach(item=>{
        const qty=Number(item.quantity)||0;
        let bc='bg',bt='In Stock';
        if(qty<20){bc='bc';bt='Critical';}
        else if(qty<50){bc='bl';bt='Low Stock';}
        const assigned = item.assignedTo ? `<span style="font-size:0.78rem;color:#3b82f6">${esc(item.assignedTo)}</span>` : `<span style="color:var(--muted);font-size:0.78rem">—</span>`;
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td><div class="item-name"><div class="item-icon"><i class="fas fa-spray-can"></i></div>${esc(item.name)}</div></td>
          <td><strong>${qty}</strong></td>
          <td>${esc(item.unit||'pcs')}</td>
          <td><span class="badge ${bc}">${bt}</span></td>
          <td>${assigned}</td>
          <td><div class="action-btns">
            <button class="icon-btn edit" data-id="${item.id}" title="Edit"><i class="fas fa-pen"></i></button>
            <button class="icon-btn assign" data-id="${item.id}" title="Assign to user"><i class="fas fa-user-tag"></i></button>
            <button class="icon-btn restock" data-id="${item.id}" title="Restock"><i class="fas fa-truck"></i></button>
            <button class="icon-btn del" data-id="${item.id}" title="Delete"><i class="fas fa-trash"></i></button>
          </div></td>`;
        tbody.appendChild(tr);
      });

      // Edit handlers
      tbody.querySelectorAll('.icon-btn.edit').forEach(btn=>{
        btn.onclick=()=>{
          const it=allItems.find(i=>i.id===btn.dataset.id); if(!it)return;
          editId=it.id;
          document.getElementById('fName').value=it.name||'';
          document.getElementById('fQty').value=it.quantity||'';
          document.getElementById('fUnit').value=it.unit||'';
          document.getElementById('modalTitle').textContent='Edit Item';
          clearErrors();
          document.getElementById('itemModal').classList.add('open');
        };
      });

      // Delete handlers
      tbody.querySelectorAll('.icon-btn.del').forEach(btn=>{
        btn.onclick=async()=>{ 
          if(confirm('Delete this item?')) {
            try {
              await remove(ref(db,`cleaningInventory/${btn.dataset.id}`));
            } catch(err) {
              console.error('Delete error:', err);
              alert('Error deleting item');
            }
          }
        };
      });

      // Restock handlers
      tbody.querySelectorAll('.icon-btn.restock').forEach(btn=>{
        btn.onclick=()=>{
          const it=allItems.find(i=>i.id===btn.dataset.id); if(!it)return;
          restockId=it.id;
          document.getElementById('restockItemName').textContent=it.name;
          document.getElementById('rQty').value='';
          document.getElementById('rSupplier').value='';
          document.getElementById('rPrice').value='';
          document.getElementById('rDate').value=new Date().toISOString().slice(0,10);
          clearErrors();
          document.getElementById('restockModal').classList.add('open');
        };
      });

      // Assign handlers
      tbody.querySelectorAll('.icon-btn.assign').forEach(btn=>{
        btn.onclick=async()=>{
          const it=allItems.find(i=>i.id===btn.dataset.id); if(!it)return;
          assignId=it.id;
          document.getElementById('assignItemName').textContent=it.name;
          document.getElementById('aQty').value='';
          document.getElementById('aDate').value=new Date().toISOString().slice(0,10);
          const assignList=document.getElementById('assignList');
          assignList.innerHTML='<div style="padding:10px;color:var(--muted)">Loading...</div>';
          clearErrors();
          document.getElementById('assignModal').classList.add('open');

          try {
            const defaultUsers=[{username:'kaunda'},{username:'pmp'},{username:'penta'},{username:'faiyaz mulla'},{username:'chishela'}];
            const snap2=await get(ref(db,'cleanMaterialsUsers'));
            const extra=snap2.val()?Object.values(snap2.val()):[];
            const all=[...defaultUsers,...extra];
            assignList.innerHTML=all.map(u=>`
              <div class="assign-row">
                <input type="checkbox" class="assign-check" value="${esc(u.name||u.username)}">
                <span>${esc(u.name||u.username)}</span>
                ${u.department?`<span style="font-size:0.75rem;color:var(--muted);margin-left:auto">${esc(u.department)}</span>`:''}
              </div>`).join('');
          } catch(err) {
            console.error('Users loading error:', err);
            assignList.innerHTML='<div style="padding:10px;color:#dc2626">Error loading users</div>';
          }
        };
      });
    } catch(err) {
      console.error('onValue listener error:', err);
    }
  });

  // ADD ITEM
  document.getElementById('addBtn').onclick=()=>{
    editId=null;
    document.getElementById('fName').value='';
    document.getElementById('fQty').value='';
    document.getElementById('fUnit').value='';
    document.getElementById('modalTitle').textContent='Add Item';
    clearErrors();
    document.getElementById('itemModal').classList.add('open');
    setTimeout(()=>document.getElementById('fName').focus(),100);
  };

  document.getElementById('itemCancel').onclick=()=>{ 
    document.getElementById('itemModal').classList.remove('open'); 
    editId=null; 
    clearErrors();
  };

  document.getElementById('itemSave').onclick=async()=>{
    clearErrors();
    const name=document.getElementById('fName').value.trim();
    const qtyVal=document.getElementById('fQty').value.trim();
    const qty=qtyVal ? parseInt(qtyVal) : NaN;
    const unit=document.getElementById('fUnit').value.trim()||'pcs';

    let hasError = false;
    if(!name){
      showError('errName');
      hasError = true;
    }
    if(isNaN(qty) || qty <= 0){
      showError('errQty');
      hasError = true;
    }

    if(hasError) return;

    try {
      if(editId){
        await update(ref(db,`cleaningInventory/${editId}`),{name,quantity:qty,unit,updatedAt:Date.now()});
      } else {
        await push(invRef,{name,quantity:qty,unit,createdAt:Date.now()});
      }
      document.getElementById('itemModal').classList.remove('open');
      editId=null;
    } catch(err) {
      console.error('Save error:', err);
      alert('Error saving item: ' + err.message);
    }
  };

  // RESTOCK
  document.getElementById('restockCancel').onclick=()=>{ 
    document.getElementById('restockModal').classList.remove('open'); 
    restockId=null;
    clearErrors();
  };

  document.getElementById('restockSave').onclick=async()=>{
    clearErrors();
    const qtyVal=document.getElementById('rQty').value.trim();
    const addQty=qtyVal ? parseInt(qtyVal) : NaN;
    const supplier=document.getElementById('rSupplier').value.trim();
    const price=parseFloat(document.getElementById('rPrice').value)||0;
    const date=document.getElementById('rDate').value;

    let hasError = false;
    if(!supplier){
      showError('errSupplier');
      hasError = true;
    }
    if(isNaN(addQty) || addQty <= 0){
      showError('errRQty');
      hasError = true;
    }

    if(hasError) return;

    try {
      const it=allItems.find(i=>i.id===restockId); 
      if(!it) {
        alert('Item not found');
        return;
      }
      const newQty=(Number(it.quantity)||0)+addQty;
      await update(ref(db,`cleaningInventory/${restockId}`),{quantity:newQty,lastRestocked:date,lastSupplier:supplier,updatedAt:Date.now()});
      await push(ref(db,'restockLogs'),{
        itemId:restockId, itemName:it.name, supplier, qtyAdded:addQty, price, date, createdAt:Date.now()
      });
      document.getElementById('restockModal').classList.remove('open');
      restockId=null;
    } catch(err) {
      console.error('Restock error:', err);
      alert('Error restocking: ' + err.message);
    }
  };

  // ASSIGN
  document.getElementById('assignCancel').onclick=()=>{ 
    document.getElementById('assignModal').classList.remove('open'); 
    assignId=null;
    clearErrors();
  };

  document.getElementById('assignSave').onclick=async()=>{
    clearErrors();
    const checked=[...document.querySelectorAll('.assign-check:checked')].map(c=>c.value);
    const qtyVal=document.getElementById('aQty').value.trim();
    const qty=qtyVal ? parseInt(qtyVal) : NaN;
    const date=document.getElementById('aDate').value;

    let hasError = false;
    if(!checked.length){
      alert('Select at least one user.');
      hasError = true;
    }
    if(isNaN(qty) || qty <= 0){
      showError('errAQty');
      hasError = true;
    }

    if(hasError) return;

    try {
      const it=allItems.find(i=>i.id===assignId); 
      if(!it) {
        alert('Item not found');
        return;
      }
      await update(ref(db,`cleaningInventory/${assignId}`),{assignedTo:checked.join(', '),updatedAt:Date.now()});
      await push(ref(db,'assignmentLogs'),{
        itemId:assignId, itemName:it.name, assignedTo:checked.join(', '), qty, date, createdAt:Date.now()
      });
      document.getElementById('assignModal').classList.remove('open');
      assignId=null;
    } catch(err) {
      console.error('Assign error:', err);
      alert('Error assigning item: ' + err.message);
    }
  };

  // close modals on overlay click
  ['itemModal','restockModal','assignModal'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{
      if(e.target===document.getElementById(id)) {
        document.getElementById(id).classList.remove('open');
        clearErrors();
      }
    });
  });

  setInterval(()=>window.parent?.postMessage({type:'reset_session_timer'},'*'),30000);
  document.addEventListener('click',()=>window.parent?.postMessage({type:'reset_session_timer'},'*'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f4f5f7;
      --white: #ffffff;
      --accent: #f59e0b;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --yellow: #d97706;
      --yellow-bg: #fef3c7;
      --red: #dc2626;
      --red-bg: #fee2e2;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); padding:28px; color:var(--text); }

    .page-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .page-header h2 { font-size:1.3rem; font-weight:600; }
    .page-header h2 span { color:var(--text-muted); font-weight:400; font-size:1rem; margin-left:6px; }

    .btn-primary {
      background: var(--accent);
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex; align-items:center; gap:7px;
      transition: 0.15s;
      font-family: inherit;
    }
    .btn-primary:hover { filter: brightness(0.92); }

    /* Form */
    .form-panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      display: none;
    }
    .form-panel.open { display:block; }
    .form-row { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; }
    .form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:140px; }
    .form-group label { font-size:0.78rem; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
    .form-group input {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
    .form-actions { display:flex; gap:8px; align-items:flex-end; }
    .btn-save { background:#111827; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit; transition:0.15s; }
    .btn-save:hover { background:#1f2937; }
    .btn-cancel { background:none; border:1px solid var(--border); padding:10px 16px; border-radius:8px; font-size:0.88rem; cursor:pointer; font-family:inherit; color:var(--text-muted); transition:0.15s; }
    .btn-cancel:hover { background:var(--bg); }

    /* Table */
    .table-wrap {
      background:var(--white);
      border-radius:var(--radius);
      border:1px solid var(--border);
      overflow:hidden;
    }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:#f9fafb; }
    th {
      padding:12px 16px;
      text-align:left;
      font-size:0.75rem;
      font-weight:600;
      color:var(--text-muted);
      text-transform:uppercase;
      letter-spacing:0.06em;
      border-bottom:1px solid var(--border);
    }
    td {
      padding:14px 16px;
      font-size:0.9rem;
      border-bottom:1px solid #f3f4f6;
      vertical-align:middle;
    }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover { background:#fafafa; }

    .item-name { font-weight:500; display:flex; align-items:center; gap:8px; }
    .item-icon { width:30px; height:30px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:0.8rem; }

    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:40px;
      font-size:0.75rem; font-weight:600;
    }
    .badge-good { background:var(--green-bg); color:var(--green); }
    .badge-low { background:var(--yellow-bg); color:var(--yellow); }
    .badge-critical { background:var(--red-bg); color:var(--red); }

    .action-btns { display:flex; gap:6px; }
    .btn-edit {
      background:none; border:1px solid var(--border);
      width:30px; height:30px; border-radius:7px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:var(--text-muted); font-size:0.8rem; transition:0.15s;
    }
    .btn-edit:hover { border-color:#111827; color:#111827; background:#f9fafb; }
    .btn-delete {
      background:none; border:1px solid #fee2e2;
      width:30px; height:30px; border-radius:7px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:#dc2626; font-size:0.8rem; transition:0.15s;
    }
    .btn-delete:hover { background:var(--red-bg); border-color:var(--red); }

    .empty-state { padding:50px; text-align:center; color:var(--text-muted); }
    .empty-state i { font-size:2rem; margin-bottom:10px; opacity:0.3; display:block; }

    /* Stats bar */
    .stats-bar {
      display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;
    }
    .stat-pill {
      background:var(--white);
      border:1px solid var(--border);
      border-radius:40px;
      padding:7px 16px;
      font-size:0.82rem;
      color:var(--text-muted);
      display:flex; align-items:center; gap:6px;
    }
    .stat-pill strong { color:var(--text); }

    @media(max-width:600px){ body{padding:16px;} th,td{padding:10px 12px;} }
  </style>
</head>
<body>

<div class="page-header">
  <h2>Inventory <span>Cleaning Materials</span></h2>
  <button class="btn-primary" id="addBtn"><i class="fas fa-plus"></i> Add Item</button>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-pill"><i class="fas fa-boxes"></i> Total: <strong id="statTotal">—</strong></div>
  <div class="stat-pill"><i class="fas fa-exclamation-triangle" style="color:#d97706"></i> Low Stock: <strong id="statLow">—</strong></div>
  <div class="stat-pill"><i class="fas fa-times-circle" style="color:#dc2626"></i> Critical: <strong id="statCrit">—</strong></div>
</div>

<div class="form-panel" id="formPanel">
  <div class="form-row">
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="itemName" placeholder="e.g. Floor Cleaner">
    </div>
    <div class="form-group" style="max-width:160px;">
      <label>Quantity</label>
      <input type="number" id="itemQty" placeholder="0" min="0">
    </div>
    <div class="form-group" style="max-width:160px;">
      <label>Unit</label>
      <input type="text" id="itemUnit" placeholder="pcs / litres / kg">
    </div>
    <div class="form-actions">
      <button class="btn-save" id="saveBtn"><i class="fas fa-check"></i> Save</button>
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Quantity</th>
        <th>Unit</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="inventoryBody">
      <tr><td colspan="5" class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading...</td></tr>
    </tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",
    authDomain: "project-app-58ff6.firebaseapp.com",
    databaseURL: "https://project-app-58ff6-default-rtdb.firebaseio.com",
    projectId: "project-app-58ff6",
    storageBucket: "project-app-58ff6.appspot.com",
    messagingSenderId: "586923989952",
    appId: "1:586923989952:web:72b300dbc00d830e2e4625"
  };
  const app = initializeApp(config);
  const db = getDatabase(app);
  const invRef = ref(db, 'cleaningInventory');

  let editId = null;

  const tbody = document.getElementById('inventoryBody');
  const formPanel = document.getElementById('formPanel');

  // Live listener — always in sync with DB
  onValue(invRef, snap => {
    const data = snap.val();
    const items = data ? Object.entries(data).map(([id,v]) => ({ id, ...v })) : [];

    // Update stats
    document.getElementById('statTotal').textContent = items.length;
    document.getElementById('statLow').textContent = items.filter(i => Number(i.quantity) < 50 && Number(i.quantity) >= 20).length;
    document.getElementById('statCrit').textContent = items.filter(i => Number(i.quantity) < 20).length;

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state"><i class="fas fa-box-open"></i>No items yet — click "Add Item" to get started</td></tr>`;
      return;
    }

    tbody.innerHTML = '';
    items.forEach(item => {
      const qty = Number(item.quantity) || 0;
      let badgeClass, badgeText;
      if (qty < 20) { badgeClass='badge-critical'; badgeText='Critical'; }
      else if (qty < 50) { badgeClass='badge-low'; badgeText='Low Stock'; }
      else { badgeClass='badge-good'; badgeText='In Stock'; }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="item-name"><div class="item-icon"><i class="fas fa-spray-can"></i></div>${esc(item.name)}</div></td>
        <td><strong>${qty}</strong></td>
        <td>${esc(item.unit||'pcs')}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn-edit" data-id="${item.id}" title="Edit"><i class="fas fa-pen"></i></button>
            <button class="btn-delete" data-id="${item.id}" title="Delete"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const found = items.find(i => i.id === btn.dataset.id);
        if (found) {
          editId = found.id;
          document.getElementById('itemName').value = found.name || '';
          document.getElementById('itemQty').value = found.quantity || '';
          document.getElementById('itemUnit').value = found.unit || '';
          formPanel.classList.add('open');
          document.getElementById('itemName').focus();
        }
      });
    });

    tbody.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Delete this item?')) {
          remove(ref(db, `cleaningInventory/${btn.dataset.id}`));
        }
      });
    });
  });

  document.getElementById('addBtn').addEventListener('click', () => {
    editId = null;
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = '';
    document.getElementById('itemUnit').value = '';
    formPanel.classList.add('open');
    document.getElementById('itemName').focus();
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    formPanel.classList.remove('open');
    editId = null;
  });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const name = document.getElementById('itemName').value.trim();
    const qty = parseInt(document.getElementById('itemQty').value);
    const unit = document.getElementById('itemUnit').value.trim() || 'pcs';
    if (!name || isNaN(qty) || qty < 0) {
      alert('Please enter a valid item name and quantity.');
      return;
    }
    if (editId) {
      await update(ref(db, `cleaningInventory/${editId}`), { name, quantity: qty, unit, updatedAt: Date.now() });
    } else {
      await push(invRef, { name, quantity: qty, unit, createdAt: Date.now() });
    }
    formPanel.classList.remove('open');
    editId = null;
  });

  function esc(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  // Reset parent session timer
  setInterval(() => window.parent?.postMessage({ type:'reset_session_timer' },'*'), 30000);
  document.addEventListener('click', () => window.parent?.postMessage({ type:'reset_session_timer' },'*'));
</script>
</body>
</html>

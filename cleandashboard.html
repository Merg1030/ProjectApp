<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Materials — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f4f5f7;
      --sidebar: #111827;
      --sidebar-hover: #1f2937;
      --accent: #f59e0b;
      --accent-dim: rgba(245,158,11,0.13);
      --text: #111827;
      --text-muted: #6b7280;
      --white: #ffffff;
      --border: #e5e7eb;
      --sidebar-w: 260px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex-shrink: 0;
      transition: width 0.28s ease;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 0; }

    .sidebar-brand {
      padding: 26px 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .brand-name { font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: 0.02em; white-space:nowrap; }
    .brand-dot { display:inline-block; width:8px; height:8px; background:var(--accent); border-radius:50%; margin-right:8px; }
    .brand-sub { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.08em; white-space:nowrap; }

    .sidebar-nav { flex:1; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y:auto; }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 10px 12px 4px;
      white-space: nowrap;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 13px;
      border-radius: 9px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-item i { width:17px; text-align:center; font-size:0.9rem; flex-shrink:0; }
    .nav-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.88); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); }

    .nav-divider { height:1px; background:rgba(255,255,255,0.07); margin:8px 0; }
    .nav-item.logout { color: rgba(255,100,100,0.55); }
    .nav-item.logout:hover { background: rgba(220,53,69,0.13); color: #f87171; }

    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display:flex; align-items:center; gap:14px; }
    .toggle-btn {
      width:34px; height:34px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      display:flex; align-items:center; justify-content:center;
      color:var(--text-muted); font-size:0.88rem; transition:0.15s;
    }
    .toggle-btn:hover { background:var(--border); color:var(--text); }
    .page-title { font-size:0.95rem; font-weight:600; color:var(--text); }
    .page-title span { color:var(--text-muted); font-weight:400; }

    .user-chip {
      display:flex; align-items:center; gap:8px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:40px; padding:5px 14px 5px 7px;
      font-size:0.83rem; font-weight:500; color:var(--text);
    }
    .user-avatar {
      width:24px; height:24px; background:var(--accent);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:0.68rem; font-weight:700; color:#fff;
    }

    .content-area { flex:1; overflow:hidden; }
    .content-area iframe { width:100%; height:100%; border:none; display:block; }

    @media(max-width:768px){
      .sidebar { position:fixed; z-index:999; }
      .sidebar.collapsed { width:0; }
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-name"><span class="brand-dot"></span>Clean Materials</div>
    <div class="brand-sub">Management System</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a class="nav-item active" data-page="inventory" href="#">
      <i class="fas fa-box-open"></i> Inventory
    </a>
    <a class="nav-item" data-page="users" href="#">
      <i class="fas fa-users"></i> Users
    </a>
    <a class="nav-item" data-page="report" href="#">
      <i class="fas fa-chart-bar"></i> Reports
    </a>

    <div class="nav-section-label" style="margin-top:6px;">Finance</div>
    <a class="nav-item" data-page="accounts" href="#">
      <i class="fas fa-receipt"></i> Accounts
    </a>

    <div class="nav-divider"></div>
    <a class="nav-item logout" id="logoutBtn" href="#">
      <i class="fas fa-sign-out-alt"></i> Logout
    </a>
  </nav>
</aside>

<div class="main" id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="toggle-btn" id="toggleBtn"><i class="fas fa-bars"></i></button>
      <div class="page-title" id="pageTitle">Inventory <span>/ Overview</span></div>
    </div>
    <div class="user-chip">
      <div class="user-avatar" id="userInitial">K</div>
      <span id="userNameDisplay">Kaunda</span>
    </div>
  </header>
  <div class="content-area">
    <iframe id="pageFrame" src="cleaninventory.html" title="Content"></iframe>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",
    authDomain: "project-app-58ff6.firebaseapp.com",
    databaseURL: "https://project-app-58ff6-default-rtdb.firebaseio.com",
    projectId: "project-app-58ff6",
    storageBucket: "project-app-58ff6.appspot.com",
    messagingSenderId: "586923989952",
    appId: "1:586923989952:web:72b300dbc00d830e2e4625"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const currentUser = localStorage.getItem('currentUser') || 'Kaunda';
  const displayName = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
  document.getElementById('userNameDisplay').textContent = displayName;
  document.getElementById('userInitial').textContent = displayName.charAt(0).toUpperCase();

  const pages = {
    inventory: { file:'cleaninventory.html', label:'Inventory',  sub:'/ Overview'  },
    users:     { file:'cleanuser.html',      label:'Users',      sub:'/ Directory'  },
    report:    { file:'cleanreport.html',    label:'Reports',    sub:'/ Analytics'  },
    accounts:  { file:'cleanaccounts.html',  label:'Accounts',   sub:'/ Receipts'   }
  };

  const frame   = document.getElementById('pageFrame');
  const titleEl = document.getElementById('pageTitle');

  function loadPage(key) {
    const p = pages[key]; if (!p) return;
    frame.src = p.file;
    titleEl.innerHTML = `${p.label} <span>${p.sub}</span>`;
    document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.remove('active'));
    document.querySelector(`.nav-item[data-page="${key}"]`)?.classList.add('active');
  }

  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const page = el.dataset.page;
      resetTimer();
      loadPage(page);
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    performLogout('Manual logout');
  });

  function performLogout(reason = 'Logged out') {
    clearTimeout(inactivityTimer);
    push(ref(db, 'logoutLogs'), { username: currentUser, timestamp: new Date().toISOString(), reason }).catch(()=>{});
    localStorage.removeItem('currentUser');
    localStorage.removeItem('sessionActive');
    window.location.href = 'index.html';
  }

  document.getElementById('toggleBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
    resetTimer();
  });

  const TIMEOUT = 15 * 60 * 1000;
  let inactivityTimer;
  function resetTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => performLogout('Auto-logout: 15 min inactivity'), TIMEOUT);
  }
  ['mousedown','mousemove','keydown','scroll','click','touchstart'].forEach(evt =>
    document.addEventListener(evt, resetTimer, { passive:true })
  );
  window.addEventListener('message', e => { if (e.data?.type === 'reset_session_timer') resetTimer(); });
  document.addEventListener('visibilitychange', () => { if (!document.hidden) resetTimer(); });
  resetTimer();
</script>
</body>
</html>

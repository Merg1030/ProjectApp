<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg:#f4f5f7;--white:#fff;--accent:#f59e0b;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--r:12px;--green:#16a34a;--yellow:#d97706;--red:#dc2626;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);padding:24px;color:var(--text);}

    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
    h2{font-size:1.2rem;font-weight:600;} h2 span{color:var(--muted);font-weight:400;font-size:0.95rem;margin-left:6px;}

    .btn{border:none;padding:9px 18px;border-radius:40px;font-weight:600;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:0.15s;}
    .btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text);} .btn-outline:hover{background:var(--bg);}
    .btn-outline.spinning i{animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px;}
    .kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;border-left:3px solid var(--border);}
    .kpi.a{border-left-color:var(--accent);} .kpi.g{border-left-color:var(--green);} .kpi.y{border-left-color:var(--yellow);} .kpi.r{border-left-color:var(--red);}
    .kpi-lbl{font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
    .kpi-val{font-size:1.8rem;font-weight:600;line-height:1;margin-bottom:3px;}
    .kpi-sub{font-size:0.75rem;color:var(--muted);}

    .section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
    .sec-hdr{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .sec-hdr h3{font-size:0.88rem;font-weight:600;}
    .ts{font-size:0.75rem;color:var(--muted);}

    table{width:100%;border-collapse:collapse;}
    th{padding:10px 14px;text-align:left;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;background:#f9fafb;border-bottom:1px solid var(--border);}
    td{padding:11px 14px;font-size:0.87rem;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}

    .badge{display:inline-flex;padding:3px 9px;border-radius:40px;font-size:0.72rem;font-weight:600;}
    .bg{background:#dcfce7;color:var(--green);} .bl{background:#fef3c7;color:var(--yellow);} .bc{background:#fee2e2;color:var(--red);}

    .bar-wrap{width:100%;background:#f3f4f6;border-radius:40px;height:5px;margin-top:5px;}
    .bar-fill{height:5px;border-radius:40px;background:var(--accent);transition:width 0.4s ease;}
    .empty-state{padding:36px;text-align:center;color:var(--muted);}
  </style>
</head>
<body>

<div class="page-header">
  <h2>Reports <span>Analytics</span></h2>
  <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
</div>

<div class="kpi-grid">
  <div class="kpi a"><div class="kpi-lbl">Item Types</div><div class="kpi-val" id="kpiTotal">—</div><div class="kpi-sub">Unique products</div></div>
  <div class="kpi g"><div class="kpi-lbl">Total Units</div><div class="kpi-val" id="kpiUnits">—</div><div class="kpi-sub">In stock now</div></div>
  <div class="kpi y"><div class="kpi-lbl">Low Stock</div><div class="kpi-val" id="kpiLow">—</div><div class="kpi-sub">Below 50 units</div></div>
  <div class="kpi r"><div class="kpi-lbl">Critical</div><div class="kpi-val" id="kpiCrit">—</div><div class="kpi-sub">Below 20 units</div></div>
</div>

<div class="section">
  <div class="sec-hdr">
    <h3><i class="fas fa-exclamation-triangle" style="color:#d97706;margin-right:7px"></i>Stock Alerts</h3>
    <span class="ts" id="ts">—</span>
  </div>
  <table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Status</th></tr></thead>
    <tbody id="alertBody"><tr><td colspan="4" class="empty-state">Loading...</td></tr></tbody>
  </table>
</div>

<div class="section">
  <div class="sec-hdr"><h3><i class="fas fa-boxes" style="color:var(--muted);margin-right:7px"></i>Full Inventory</h3></div>
  <table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Level</th><th>Status</th></tr></thead>
    <tbody id="fullBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
  </table>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const cfg={apiKey:"AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",authDomain:"project-app-58ff6.firebaseapp.com",databaseURL:"https://project-app-58ff6-default-rtdb.firebaseio.com",projectId:"project-app-58ff6",storageBucket:"project-app-58ff6.appspot.com",messagingSenderId:"586923989952",appId:"1:586923989952:web:72b300dbc00d830e2e4625"};
  const app=initializeApp(cfg);
  const db=getDatabase(app);

  function esc(s){if(!s)return'';return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  onValue(ref(db,'cleaningInventory'), snap=>{
    const data=snap.val();
    const items=data?Object.values(data):[];
    const total=items.length;
    const units=items.reduce((s,i)=>s+(Number(i.quantity)||0),0);
    const low=items.filter(i=>Number(i.quantity)<50&&Number(i.quantity)>=20);
    const crit=items.filter(i=>Number(i.quantity)<20);

    document.getElementById('kpiTotal').textContent=total;
    document.getElementById('kpiUnits').textContent=units;
    document.getElementById('kpiLow').textContent=low.length;
    document.getElementById('kpiCrit').textContent=crit.length;
    document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();

    const alerts=[...crit,...low];
    const ab=document.getElementById('alertBody');
    if(!alerts.length){
      ab.innerHTML=`<tr><td colspan="4" class="empty-state"><i class="fas fa-check-circle" style="color:#16a34a"></i> All items well stocked</td></tr>`;
    } else {
      ab.innerHTML=alerts.map(i=>{
        const qty=Number(i.quantity)||0;
        const cls=qty<20?'bc':'bl'; const txt=qty<20?'Critical':'Low Stock';
        return `<tr><td style="font-weight:500">${esc(i.name)}</td><td><strong>${qty}</strong></td><td>${esc(i.unit||'pcs')}</td><td><span class="badge ${cls}">${txt}</span></td></tr>`;
      }).join('');
    }

    const fb=document.getElementById('fullBody');
    if(!items.length){fb.innerHTML=`<tr><td colspan="5" class="empty-state">No data</td></tr>`;return;}
    const maxQ=Math.max(...items.map(i=>Number(i.quantity)||0),1);
    const sorted=[...items].sort((a,b)=>(Number(a.quantity)||0)-(Number(b.quantity)||0));
    fb.innerHTML=sorted.map(i=>{
      const qty=Number(i.quantity)||0;
      let cls='bg',txt='In Stock';
      if(qty<20){cls='bc';txt='Critical';}else if(qty<50){cls='bl';txt='Low Stock';}
      const pct=Math.round((qty/maxQ)*100);
      return `<tr><td style="font-weight:500">${esc(i.name)}</td><td><strong>${qty}</strong></td><td>${esc(i.unit||'pcs')}</td>
        <td style="min-width:100px"><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div></td>
        <td><span class="badge ${cls}">${txt}</span></td></tr>`;
    }).join('');
  });

  document.getElementById('refreshBtn').onclick=()=>{
    const btn=document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setTimeout(()=>btn.classList.remove('spinning'),800);
  };

  setInterval(()=>window.parent?.postMessage({type:'reset_session_timer'},'*'),30000);
  document.addEventListener('click',()=>window.parent?.postMessage({type:'reset_session_timer'},'*'));
</script>
</body>
</html>

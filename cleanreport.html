<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hazida | stock Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f7fc;
      font-family: 'Inter', sans-serif;
      padding: 28px 24px;
      color: #0f172a;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
    }
    .title h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .title p {
      color: #475569;
      font-size: 0.8rem;
      margin-top: 6px;
    }
    .action-group {
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      background: white;
      border: 1px solid #e2e8f0;
    }
    .btn-primary {
      background: #f59e0b;
      border-color: #f59e0b;
      color: white;
    }
    .btn-primary:hover { background: #d97706; transform: translateY(-1px); }
    .btn-outline:hover { background: #fef9e3; border-color: #f59e0b; }

    .filter-card {
      background: white;
      border-radius: 28px;
      padding: 16px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      border: 1px solid #eef2f8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .date-group {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8fafc;
      padding: 6px 18px;
      border-radius: 60px;
      border: 1px solid #e2edf2;
    }
    .date-group label { font-weight: 600; font-size: 0.75rem; color: #334155; }
    input[type="date"] {
      border: none;
      background: transparent;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 6px 0;
      outline: none;
      color: #0f172a;
    }
    .range-badge {
      background: #fff7ed;
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #b45309;
    }
    .matrix-wrapper {
      background: white;
      border-radius: 24px;
      border: 1px solid #eef2f6;
      overflow-x: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }
    .inventory-matrix {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.74rem;
      min-width: 1100px;
    }
    .inventory-matrix th {
      background: #fefcf5;
      padding: 12px 8px;
      text-align: center;
      font-weight: 700;
      color: #334155;
      border-bottom: 2px solid #f1e8d9;
      border-right: 1px solid #f0e9df;
    }
    .inventory-matrix td {
      padding: 9px 6px;
      text-align: center;
      border-bottom: 1px solid #f0f2f5;
      border-right: 1px solid #f5f2ec;
      color: #1e293b;
      font-weight: 500;
    }
    .location-col {
      background: #fafdff;
      font-weight: 700;
      text-align: left;
      position: sticky;
      left: 0;
      background-color: white;
      z-index: 2;
    }
    .product-header {
      background: #fdf9f0;
      font-weight: 700;
      min-width: 110px;
    }
    .zero-cell {
      color: #a0abb9;
      background-color: #fefefe;
      font-weight: 400;
    }
    .positive-cell {
      background: #eef9ef;
      color: #2c6e2f;
      font-weight: 700;
    }
    .restock-highlight {
      background: #fff0db;
      color: #b45309;
    }
    .footer-note {
      margin-top: 24px;
      background: #fef9ef;
      border-radius: 20px;
      padding: 12px 20px;
      font-size: 0.7rem;
      color: #5b6e8c;
      text-align: center;
    }
    .loading-overlay {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #e2e8f0;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 760px) {
      body { padding: 16px; }
      .filter-card { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">
      <h1><i class="fas fa-chalkboard-user" style="color:#f59e0b;"></i> Stock Movement</h1>
 
    </div>
    <div class="action-group">
      <button class="btn btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="btn btn-primary" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
    </div>
  </div>

  <div class="filter-card">
    <div class="date-group">
      <label><i class="far fa-calendar-alt"></i> From</label>
      <input type="date" id="startDateFilter">
    </div>
    <div class="date-group">
      <label><i class="far fa-calendar-alt"></i> To</label>
      <input type="date" id="endDateFilter">
    </div>
    <button class="btn btn-primary" id="applyDateBtn" style="background:#1e293b; border:none;">Apply range <i class="fas fa-chevron-right"></i></button>
    <div class="range-badge" id="dateInfoBadge">Loading...</div>
  </div>

  <div class="matrix-wrapper">
    <table class="inventory-matrix" id="matrixTable">
      <thead id="matrixHeader">
        <tr><th style="min-width: 160px;">Location / Department</th><th class="product-header">Loading products...</th></tr>
      </thead>
      <tbody id="matrixBody">
        <tr><td colspan="20" class="loading-overlay"><div class="spinner"></div> Fetching locations & products...<br>Please wait</td></tr>
      </tbody>
    </table>
  </div>
 
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    getDocs,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXhhy94Aqmaav6X0UsfMcmsBT539-aheU",
    authDomain: "project-task-588c4.firebaseapp.com",
    projectId: "project-task-588c4",
    storageBucket: "project-task-588c4.appspot.com",
    messagingSenderId: "411882772509",
    appId: "1:411882772509:web:08d613186c101a99f38ef4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // DOM elements
  const matrixHeader = document.getElementById('matrixHeader');
  const matrixBody = document.getElementById('matrixBody');
  const startDateInput = document.getElementById('startDateFilter');
  const endDateInput = document.getElementById('endDateFilter');
  const applyBtn = document.getElementById('applyDateBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const exportBtn = document.getElementById('exportPdfBtn');
  const dateInfoBadge = document.getElementById('dateInfoBadge');

  // Data stores
  let allLocations = [];      // { id, name, department }
  let allProducts = [];       // { id, name }
  let assignmentsRaw = [];    // full assignments (userId, assignedDate, items)
  let restocksRaw = [];       // { productName, quantity, date }
  
  let currentStartDate = null;
  let currentEndDate = null;

  function parseDateField(dateField) {
    if (!dateField) return null;
    if (dateField.toDate) return dateField.toDate();
    if (dateField instanceof Date) return dateField;
    if (typeof dateField === 'string') return new Date(dateField);
    return null;
  }

  // 1. LOAD LOCATIONS (from cleaningUsers + any extra location from assignments)
  async function loadLocations() {
    try {
      const usersSnap = await getDocs(collection(db, 'cleaningUsers'));
      const locs = [];
      usersSnap.forEach(doc => {
        const data = doc.data();
        const name = data.name || data.fullName || data.locationName || 'Unnamed';
        const department = data.department || data.role || 'Staff';
        locs.push({ id: doc.id, name: name, department: department });
      });
      // fallback if empty
      if (locs.length === 0) locs.push({ id: 'default', name: 'Head Office', department: 'Admin' });
      return locs;
    } catch (err) {
      console.warn("Locations error", err);
      return [{ id: 'fallback', name: 'Main Branch', department: 'Operations' }];
    }
  }

  // 2. LOAD PRODUCTS from cleanInventory (name field)
  async function loadProducts() {
    try {
      const invSnap = await getDocs(collection(db, 'cleanInventory'));
      const prods = [];
      invSnap.forEach(doc => {
        const data = doc.data();
        const pName = data.name || data.productName;
        if (pName) prods.push({ id: doc.id, name: pName });
      });
      if (prods.length === 0) prods.push({ id: 'sample', name: 'Cleaning Supply' });
      prods.sort((a,b) => a.name.localeCompare(b.name));
      return prods;
    } catch (err) {
      console.error("Products error", err);
      return [{ id: 'default', name: 'General Item' }];
    }
  }

  // 3. LOAD ASSIGNMENTS from 'assignments' collection (flatten items)
  async function loadAssignments() {
    try {
      const assignSnap = await getDocs(query(collection(db, 'assignments'), orderBy('assignedAt', 'desc')));
      const assigns = [];
      assignSnap.forEach(doc => {
        const data = doc.data();
        const assignedDate = parseDateField(data.assignedAt) || new Date();
        const userId = data.userId || data.locationId || data.user;
        const userName = data.userName || data.locationName || 'Unknown';
        const items = Array.isArray(data.items) ? data.items : [];
        assigns.push({
          id: doc.id,
          userId: userId,
          locationName: userName,
          assignedDate: assignedDate,
          items: items
        });
      });
      return assigns;
    } catch (err) {
      console.error("Assignments error", err);
      return [];
    }
  }

  // 4. LOAD RESTOCKS from 'cleanRestockHistory' (standard collection)
  async function loadRestocks() {
    try {
      const restockSnap = await getDocs(query(collection(db, 'cleanRestockHistory'), orderBy('date', 'desc')));
      const restocks = [];
      restockSnap.forEach(doc => {
        const data = doc.data();
        const restockDate = parseDateField(data.date) || new Date();
        const productName = data.productName || data.name;
        if (!productName) return;
        const qty = Number(data.restockedQuantity) || Number(data.quantity) || 0;
        restocks.push({
          id: doc.id,
          productName: productName,
          quantity: qty,
          date: restockDate
        });
      });
      // fallback: if no restock history, return empty (still show matrix)
      return restocks;
    } catch (err) {
      console.warn("Restocks collection not found, using empty", err);
      return [];
    }
  }

  // Build master matrix
  async function buildFullMatrix() {
    matrixBody.innerHTML = `<tr><td colspan="20" class="loading-overlay"><div class="spinner"></div> Building full matrix...<br>Loading locations & products</td></tr>`;
    
    const [locations, products, assignments, restocks] = await Promise.all([
      loadLocations(),
      loadProducts(),
      loadAssignments(),
      loadRestocks()
    ]);
    
    allLocations = locations;
    allProducts = products;
    assignmentsRaw = assignments;
    restocksRaw = restocks;
    
    renderMatrixHeader();
    applyFiltersAndRender(); // will apply current date filter (or default)
  }

  function renderMatrixHeader() {
    if (!allProducts.length) {
      matrixHeader.innerHTML = `<tr><th>Location</th><th>No products found</th></tr>`;
      return;
    }
    let headerHtml = `<tr><th style="min-width: 160px;">📍 Location / Department</th>`;
    allProducts.forEach(prod => {
      let displayName = prod.name.length > 24 ? prod.name.slice(0,22)+'..' : prod.name;
      headerHtml += `<th class="product-header" title="${escapeHtml(prod.name)}">${escapeHtml(displayName)}</th>`;
    });
    headerHtml += `</tr>`;
    matrixHeader.innerHTML = headerHtml;
  }

  // filter assignments & restocks by date range
  function filterDataByDateRange() {
    let filteredAssign = [...assignmentsRaw];
    let filteredRestocks = [...restocksRaw];
    if (currentStartDate && currentEndDate) {
      filteredAssign = filteredAssign.filter(a => a.assignedDate >= currentStartDate && a.assignedDate <= currentEndDate);
      filteredRestocks = filteredRestocks.filter(r => r.date >= currentStartDate && r.date <= currentEndDate);
    }
    return { filteredAssign, filteredRestocks };
  }

  function renderMatrixWithData() {
    if (!allLocations.length || !allProducts.length) {
      matrixBody.innerHTML = `<tr><td colspan="20" class="loading-overlay">⚠️ No locations or products loaded. Please ensure users & inventory exist.</td></tr>`;
      return;
    }

    const { filteredAssign, filteredRestocks } = filterDataByDateRange();
    
    // Build assignment map: locationId (or name fallback) + productName => assigned quantity
    const assignMap = new Map(); // key = `${locKey}::${prodName}`
    for (const assign of filteredAssign) {
      const locKey = assign.userId || assign.locationName;
      if (!locKey) continue;
      for (const item of assign.items) {
        const prodNameRaw = item.itemName || item.name;
        if (!prodNameRaw) continue;
        const qty = Number(item.quantity) || 0;
        const mapKey = `${locKey}::${prodNameRaw}`;
        assignMap.set(mapKey, (assignMap.get(mapKey) || 0) + qty);
      }
    }
    
    // Build restock map: productName => total restocked qty (global, not per location)
    const restockMap = new Map();
    for (const rest of filteredRestocks) {
      const prodName = rest.productName;
      if (!prodName) continue;
      const restQty = Number(rest.quantity) || 0;
      restockMap.set(prodName, (restockMap.get(prodName) || 0) + restQty);
    }
    
    // generate rows for each location
    let rowsHtml = '';
    for (const loc of allLocations) {
      const locationDisplay = `${escapeHtml(loc.name)} <span style="font-size:0.65rem; color:#6c757d;">(${escapeHtml(loc.department)})</span>`;
      rowsHtml += `<tr>`;
      rowsHtml += `<td class="location-col" style="text-align:left; font-weight:600;">${locationDisplay}</td>`;
      
      for (const prod of allProducts) {
        // try matching by location ID or location name
        let assignedQty = 0;
        const primaryKey = `${loc.id}::${prod.name}`;
        if (assignMap.has(primaryKey)) assignedQty = assignMap.get(primaryKey);
        else {
          // fallback: match by location name string (legacy)
          for (let [key, val] of assignMap.entries()) {
            if (key.endsWith(`::${prod.name}`) && (key.startsWith(loc.id) || key.startsWith(loc.name))) {
              assignedQty = val;
              break;
            }
          }
        }
        
        const restockedQty = restockMap.get(prod.name) || 0;
        
        let cellClass = '';
        let displayValue = '';
        if (assignedQty === 0 && restockedQty === 0) {
          cellClass = 'zero-cell';
          displayValue = `<span style="font-size:0.7rem;">0</span>`;
        } else {
          cellClass = 'positive-cell';
          displayValue = `<strong>${assignedQty}</strong>`;
          if (restockedQty > 0) {
            displayValue += ` <span style="font-size:0.65rem; background:#fff0db; padding:2px 6px; border-radius:16px; margin-left:4px;">R:${restockedQty}</span>`;
          } else if (assignedQty > 0) {
            displayValue += ` <span style="font-size:0.65rem; color:#8b5e3c;">(R:0)</span>`;
          } else if (restockedQty > 0) {
            displayValue = `<span style="color:#c2410c;">R:${restockedQty}</span>`;
            cellClass = 'restock-highlight';
          }
        }
        rowsHtml += `<td class="${cellClass}" style="font-size:0.73rem;">${displayValue}</td>`;
      }
      rowsHtml += `</tr>`;
    }
    
    // add a special footer row: global restock totals per product
    rowsHtml += `<tr style="background: #fef4e8; border-top: 2px solid #ffe0b5;">
      <td class="location-col" style="background:#fef4e8; font-weight:800;"> Total added</td>`;
    for (const prod of allProducts) {
      const restockedQty = restockMap.get(prod.name) || 0;
      rowsHtml += `<td style="background:#fff3e6; font-weight:700; color:#b45309;">${restockedQty > 0 ? `+${restockedQty}` : '0'}</td>`;
    }
    rowsHtml += `</tr>`;
    
    matrixBody.innerHTML = rowsHtml;
    updateDateBadge();
  }
  
  function updateDateBadge() {
    if (currentStartDate && currentEndDate) {
      dateInfoBadge.innerHTML = `<i class="far fa-calendar-check"></i> ${currentStartDate.toLocaleDateString()} – ${currentEndDate.toLocaleDateString()}`;
    } else {
      dateInfoBadge.innerHTML = `All time (no filter)`;
    }
  }
  
  function applyFiltersAndRender() {
    if (!allLocations.length || !allProducts.length) return;
    renderMatrixWithData();
  }
  
  // Set default dates (last 30 days)
  function setDefaultDates() {
    const today = new Date();
    const thirtyAgo = new Date();
    thirtyAgo.setDate(today.getDate() - 30);
    startDateInput.value = thirtyAgo.toISOString().slice(0,10);
    endDateInput.value = today.toISOString().slice(0,10);
    currentStartDate = new Date(startDateInput.value);
    currentEndDate = new Date(endDateInput.value);
    currentEndDate.setHours(23,59,59,999);
    updateDateBadge();
  }
  
  function handleApplyDate() {
    const startRaw = startDateInput.value;
    const endRaw = endDateInput.value;
    if (!startRaw || !endRaw) {
      currentStartDate = null;
      currentEndDate = null;
    } else {
      const start = new Date(startRaw);
      let end = new Date(endRaw);
      end.setHours(23,59,59,999);
      if (start > end) {
        alert("Start date cannot be after end date");
        return;
      }
      currentStartDate = start;
      currentEndDate = end;
    }
    updateDateBadge();
    renderMatrixWithData();
  }
  
  // PDF export (landscape, clean matrix)
  async function exportMatrixPDF() {
    const loadingMsg = document.createElement('div');
    loadingMsg.innerText = '📄 Generating PDF report ...';
    loadingMsg.style.position = 'fixed';
    loadingMsg.style.bottom = '20px';
    loadingMsg.style.right = '20px';
    loadingMsg.style.background = '#1e293b';
    loadingMsg.style.color = '#fff';
    loadingMsg.style.padding = '10px 20px';
    loadingMsg.style.borderRadius = '40px';
    loadingMsg.style.zIndex = '9999';
    loadingMsg.style.fontSize = '0.8rem';
    document.body.appendChild(loadingMsg);
    
    try {
      const originalMatrix = document.querySelector('.matrix-wrapper');
      const cloneWrapper = document.createElement('div');
      cloneWrapper.style.padding = '20px';
      cloneWrapper.style.background = 'white';
      cloneWrapper.style.fontFamily = 'Inter, sans-serif';
      
      const titleDiv = document.createElement('div');
      titleDiv.style.marginBottom = '20px';
      titleDiv.style.borderBottom = '2px solid #f59e0b';
      titleDiv.style.paddingBottom = '12px';
      titleDiv.innerHTML = `
        <h2 style="color:#1e293b;">Hazida Cleaning - Complete Movement Report</h2>
        <p style="color:#334155;">Period: ${currentStartDate ? currentStartDate.toLocaleDateString() : 'All time'} — ${currentEndDate ? currentEndDate.toLocaleDateString() : 'All time'}  |  Generated: ${new Date().toLocaleString()}</p>
        <p><small>Assigned quantity (issued to location) + restocked badge (global restock). Zero means no activity.</small></p>
      `;
      cloneWrapper.appendChild(titleDiv);
      
      const tableClone = originalMatrix.cloneNode(true);
      cloneWrapper.appendChild(tableClone);
      
      document.body.appendChild(cloneWrapper);
      const opt = {
        margin: [8, 8, 8, 8],
        filename: `hazida_full_movement_${new Date().toISOString().slice(0,19)}.pdf`,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 2, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      };
      await html2pdf().set(opt).from(cloneWrapper).save();
      document.body.removeChild(cloneWrapper);
      
      const successToast = document.createElement('div');
      successToast.innerText = '✅ PDF exported successfully';
      successToast.style.position = 'fixed';
      successToast.style.bottom = '20px';
      successToast.style.right = '20px';
      successToast.style.background = '#10b981';
      successToast.style.color = 'white';
      successToast.style.padding = '8px 16px';
      successToast.style.borderRadius = '40px';
      document.body.appendChild(successToast);
      setTimeout(() => successToast.remove(), 2500);
    } catch (err) {
      console.error(err);
      alert("PDF export error: " + err.message);
    } finally {
      loadingMsg.remove();
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  // Event listeners
  applyBtn.addEventListener('click', handleApplyDate);
  refreshBtn.addEventListener('click', async () => {
    matrixBody.innerHTML = `<tr><td colspan="20" class="loading-overlay"><div class="spinner"></div> Refreshing data...</td></tr>`;
    await buildFullMatrix();
    handleApplyDate(); // reapply current filter after fresh data
  });
  exportBtn.addEventListener('click', exportMatrixPDF);
  
  // INIT
  setDefaultDates();
  buildFullMatrix().then(() => {
    handleApplyDate();
  });
</script>
</body>
</html>

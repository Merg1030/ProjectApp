<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f4f5f7;
      --white: #ffffff;
      --accent: #f59e0b;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --green: #16a34a;
      --yellow: #d97706;
      --red: #dc2626;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); padding:28px; color:var(--text); }

    .page-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .page-header h2 { font-size:1.3rem; font-weight:600; }
    .page-header h2 span { color:var(--text-muted); font-weight:400; font-size:1rem; margin-left:6px; }

    .btn-refresh {
      background:var(--white);
      border:1px solid var(--border);
      padding:9px 18px;
      border-radius:40px;
      font-weight:500;
      font-size:0.88rem;
      cursor:pointer;
      display:flex; align-items:center; gap:7px;
      transition:0.15s;
      font-family:inherit;
      color:var(--text);
    }
    .btn-refresh:hover { background:var(--bg); }
    .btn-refresh.spinning i { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* KPI Cards */
    .kpi-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
      gap:14px;
      margin-bottom:24px;
    }
    .kpi-card {
      background:var(--white);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
    }
    .kpi-label { font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
    .kpi-value { font-size:2rem; font-weight:600; line-height:1; margin-bottom:4px; }
    .kpi-sub { font-size:0.78rem; color:var(--text-muted); }
    .kpi-card.accent { border-left:3px solid var(--accent); }
    .kpi-card.green { border-left:3px solid var(--green); }
    .kpi-card.yellow { border-left:3px solid var(--yellow); }
    .kpi-card.red { border-left:3px solid var(--red); }

    /* Sections */
    .section {
      background:var(--white);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      margin-bottom:18px;
    }
    .section-header {
      padding:14px 20px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .section-header h3 { font-size:0.9rem; font-weight:600; }
    .section-body { padding:0; }

    table { width:100%; border-collapse:collapse; }
    th {
      padding:10px 16px;
      text-align:left;
      font-size:0.73rem;
      font-weight:600;
      color:var(--text-muted);
      text-transform:uppercase;
      letter-spacing:0.06em;
      background:#f9fafb;
      border-bottom:1px solid var(--border);
    }
    td {
      padding:12px 16px;
      font-size:0.88rem;
      border-bottom:1px solid #f3f4f6;
    }
    tbody tr:last-child td { border-bottom:none; }

    .badge {
      display:inline-flex; padding:3px 10px;
      border-radius:40px; font-size:0.73rem; font-weight:600;
    }
    .badge-good { background:#dcfce7; color:var(--green); }
    .badge-low { background:#fef3c7; color:var(--yellow); }
    .badge-critical { background:#fee2e2; color:var(--red); }

    .bar-wrap { width:100%; background:#f3f4f6; border-radius:40px; height:6px; margin-top:6px; }
    .bar-fill { height:6px; border-radius:40px; background:var(--accent); transition:width 0.4s ease; }

    .empty-state { padding:40px; text-align:center; color:var(--text-muted); }

    .timestamp { font-size:0.78rem; color:var(--text-muted); }

    @media(max-width:600px){ body{padding:16px;} }
  </style>
</head>
<body>

<div class="page-header">
  <h2>Reports <span>Analytics</span></h2>
  <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
</div>

<div class="kpi-grid">
  <div class="kpi-card accent">
    <div class="kpi-label">Total Item Types</div>
    <div class="kpi-value" id="kpiTotal">—</div>
    <div class="kpi-sub">Unique products tracked</div>
  </div>
  <div class="kpi-card green">
    <div class="kpi-label">Total Units</div>
    <div class="kpi-value" id="kpiUnits">—</div>
    <div class="kpi-sub">Across all items</div>
  </div>
  <div class="kpi-card yellow">
    <div class="kpi-label">Low Stock</div>
    <div class="kpi-value" id="kpiLow">—</div>
    <div class="kpi-sub">Below 50 units</div>
  </div>
  <div class="kpi-card red">
    <div class="kpi-label">Critical</div>
    <div class="kpi-value" id="kpiCrit">—</div>
    <div class="kpi-sub">Below 20 units</div>
  </div>
</div>

<!-- Alerts section -->
<div class="section">
  <div class="section-header">
    <h3><i class="fas fa-exclamation-triangle" style="color:#d97706;margin-right:7px"></i>Stock Alerts</h3>
    <span class="timestamp" id="reportTime">—</span>
  </div>
  <div class="section-body">
    <table>
      <thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Status</th></tr></thead>
      <tbody id="alertBody"><tr><td colspan="4" class="empty-state">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- All inventory section -->
<div class="section">
  <div class="section-header">
    <h3><i class="fas fa-boxes" style="color:var(--text-muted);margin-right:7px"></i>Full Inventory Overview</h3>
  </div>
  <div class="section-body">
    <table>
      <thead><tr><th>Item</th><th>Quantity</th><th>Unit</th><th>Stock Level</th><th>Status</th></tr></thead>
      <tbody id="fullBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const config = {
    apiKey: "AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",
    authDomain: "project-app-58ff6.firebaseapp.com",
    databaseURL: "https://project-app-58ff6-default-rtdb.firebaseio.com",
    projectId: "project-app-58ff6",
    storageBucket: "project-app-58ff6.appspot.com",
    messagingSenderId: "586923989952",
    appId: "1:586923989952:web:72b300dbc00d830e2e4625"
  };
  const app = initializeApp(config);
  const db = getDatabase(app);

  function esc(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function render(items) {
    const total = items.length;
    const units = items.reduce((s,i) => s + (Number(i.quantity)||0), 0);
    const low = items.filter(i => Number(i.quantity) < 50 && Number(i.quantity) >= 20);
    const crit = items.filter(i => Number(i.quantity) < 20);

    document.getElementById('kpiTotal').textContent = total;
    document.getElementById('kpiUnits').textContent = units;
    document.getElementById('kpiLow').textContent = low.length;
    document.getElementById('kpiCrit').textContent = crit.length;
    document.getElementById('reportTime').textContent = 'Last updated: ' + new Date().toLocaleTimeString();

    // Alerts
    const alerts = [...crit, ...low];
    const alertBody = document.getElementById('alertBody');
    if (!alerts.length) {
      alertBody.innerHTML = `<tr><td colspan="4" class="empty-state"><i class="fas fa-check-circle" style="color:#16a34a;font-size:1.5rem;margin-bottom:8px;display:block"></i>All items are well stocked</td></tr>`;
    } else {
      alertBody.innerHTML = alerts.map(i => {
        const qty = Number(i.quantity)||0;
        const cls = qty < 20 ? 'badge-critical' : 'badge-low';
        const txt = qty < 20 ? 'Critical' : 'Low Stock';
        return `<tr>
          <td style="font-weight:500">${esc(i.name)}</td>
          <td><strong>${qty}</strong></td>
          <td>${esc(i.unit||'pcs')}</td>
          <td><span class="badge ${cls}">${txt}</span></td>
        </tr>`;
      }).join('');
    }

    // Full list
    const maxQty = Math.max(...items.map(i => Number(i.quantity)||0), 1);
    const fullBody = document.getElementById('fullBody');
    if (!items.length) {
      fullBody.innerHTML = `<tr><td colspan="5" class="empty-state">No inventory data found</td></tr>`;
    } else {
      const sorted = [...items].sort((a,b) => (Number(a.quantity)||0) - (Number(b.quantity)||0));
      fullBody.innerHTML = sorted.map(i => {
        const qty = Number(i.quantity)||0;
        let cls, txt;
        if (qty < 20) { cls='badge-critical'; txt='Critical'; }
        else if (qty < 50) { cls='badge-low'; txt='Low Stock'; }
        else { cls='badge-good'; txt='In Stock'; }
        const pct = Math.round((qty/maxQty)*100);
        return `<tr>
          <td style="font-weight:500">${esc(i.name)}</td>
          <td><strong>${qty}</strong></td>
          <td>${esc(i.unit||'pcs')}</td>
          <td style="min-width:120px">
            <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
          </td>
          <td><span class="badge ${cls}">${txt}</span></td>
        </tr>`;
      }).join('');
    }
  }

  // Live listener
  onValue(ref(db, 'cleaningInventory'), snap => {
    const data = snap.val();
    const items = data ? Object.values(data) : [];
    render(items);
  });

  // Refresh button (just triggers animation — data is live anyway)
  const btn = document.getElementById('refreshBtn');
  btn.addEventListener('click', () => {
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 800);
  });

  setInterval(() => window.parent?.postMessage({ type:'reset_session_timer' },'*'), 30000);
  document.addEventListener('click', () => window.parent?.postMessage({ type:'reset_session_timer' },'*'));
</script>
</body>
</html>

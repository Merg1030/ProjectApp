<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg:#f4f5f7;--white:#fff;--accent:#f59e0b;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--r:12px;--green:#16a34a;--gbg:#dcfce7;--red:#dc2626;--rbg:#fee2e2;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);padding:24px;color:var(--text);}

    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
    h2{font-size:1.2rem;font-weight:600;} h2 span{color:var(--muted);font-weight:400;font-size:0.95rem;margin-left:6px;}

    .btn{border:none;padding:9px 18px;border-radius:40px;font-weight:600;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:0.15s;}
    .btn-accent{background:var(--accent);} .btn-accent:hover{filter:brightness(0.92);}
    .btn-dark{background:#111827;color:#fff;} .btn-dark:hover{background:#1f2937;}
    .btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text);} .btn-outline:hover{background:var(--bg);}

    /* Summary pills */
    .summary-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .sum-pill{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 18px;min-width:160px;}
    .sum-label{font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
    .sum-val{font-size:1.4rem;font-weight:600;}
    .sum-pill.paid .sum-val{color:var(--green);}
    .sum-pill.unpaid .sum-val{color:var(--red);}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:var(--r);padding:24px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,0.12);margin:16px;}
    .modal-title{font-size:1rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
    .form-group label{font-size:0.73rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;outline:none;transition:0.15s;background:white;}
    .form-group textarea{resize:vertical;min-height:70px;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

    /* Table */
    .table-wrap{background:var(--white);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{padding:10px 14px;text-align:left;font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;background:#f9fafb;border-bottom:1px solid var(--border);}
    td{padding:12px 14px;font-size:0.88rem;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;} tbody tr:hover{background:#fafafa;}

    .badge{display:inline-flex;padding:3px 9px;border-radius:40px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:0.15s;}
    .badge-paid{background:var(--gbg);color:var(--green);}
    .badge-unpaid{background:var(--rbg);color:var(--red);}
    .badge-paid:hover,.badge-unpaid:hover{opacity:0.75;}

    .action-btns{display:flex;gap:5px;}
    .icon-btn{background:none;border:1px solid #fecaca;width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:0.75rem;transition:0.15s;}
    .icon-btn:hover{background:#fee2e2;}

    .empty-state{padding:44px;text-align:center;color:var(--muted);}
    .empty-state i{font-size:1.8rem;margin-bottom:8px;opacity:0.25;display:block;}

    .amount-val{font-weight:600;font-variant-numeric:tabular-nums;}

    @media(max-width:600px){body{padding:14px;}.form-row-2{grid-template-columns:1fr;}th,td{padding:9px 10px;}}
  </style>
</head>
<body>

<div class="page-header">
  <h2>Accounts <span>Material Receipts</span></h2>
  <button class="btn btn-accent" id="addReceiptBtn"><i class="fas fa-plus"></i> Add Receipt</button>
</div>

<div class="summary-bar">
  <div class="sum-pill"><div class="sum-label">Total Receipts</div><div class="sum-val" id="sumTotal">—</div></div>
  <div class="sum-pill paid"><div class="sum-label">Total Paid</div><div class="sum-val" id="sumPaid">—</div></div>
  <div class="sum-pill unpaid"><div class="sum-label">Total Unpaid</div><div class="sum-val" id="sumUnpaid">—</div></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Date</th><th>Description</th><th>Reference</th><th>Supplier</th><th>Amount (ZMW)</th><th>Status</th><th></th></tr>
    </thead>
    <tbody id="accountsBody">
      <tr><td colspan="7" class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- ADD RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="modal">
    <div class="modal-title"><i class="fas fa-receipt" style="color:var(--accent)"></i> Add Receipt</div>
    <div class="form-row-2">
      <div class="form-group"><label>Date</label><input type="date" id="rDate"></div>
      <div class="form-group"><label>Reference No.</label><input type="text" id="rRef" placeholder="e.g. INV-001"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="rDesc" placeholder="What was purchased..."></textarea></div>
    <div class="form-row-2">
      <div class="form-group"><label>Supplier</label><input type="text" id="rSupplier" placeholder="e.g. ABC Supplies"></div>
      <div class="form-group"><label>Amount (ZMW)</label><input type="number" id="rAmount" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="rStatus">
        <option value="unpaid">Unpaid</option>
        <option value="paid">Paid</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="receiptCancel">Cancel</button>
      <button class="btn btn-dark" id="receiptSave"><i class="fas fa-check"></i> Save Receipt</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/9.10.0/firebase-database.js";

  const cfg={apiKey:"AIzaSyDxQ9ai-C2RlJy27p_kdHkKXeqz1Cpbyh4",authDomain:"project-app-58ff6.firebaseapp.com",databaseURL:"https://project-app-58ff6-default-rtdb.firebaseio.com",projectId:"project-app-58ff6",storageBucket:"project-app-58ff6.appspot.com",messagingSenderId:"586923989952",appId:"1:586923989952:web:72b300dbc00d830e2e4625"};
  const app=initializeApp(cfg);
  const db=getDatabase(app);
  const acctRef=ref(db,'cleanAccounts');

  function esc(s){if(!s)return'';return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function fmt(n){return Number(n||0).toLocaleString('en-ZM',{minimumFractionDigits:2,maximumFractionDigits:2});}

  const tbody=document.getElementById('accountsBody');

  onValue(acctRef, snap=>{
    const data=snap.val();
    const records=data?Object.entries(data).map(([id,v])=>({id,...v})):[];

    // sort newest first
    records.sort((a,b)=>new Date(b.date)-new Date(a.date));

    const totalPaid=records.filter(r=>r.status==='paid').reduce((s,r)=>s+Number(r.amount||0),0);
    const totalUnpaid=records.filter(r=>r.status!=='paid').reduce((s,r)=>s+Number(r.amount||0),0);
    document.getElementById('sumTotal').textContent=records.length;
    document.getElementById('sumPaid').textContent='K '+fmt(totalPaid);
    document.getElementById('sumUnpaid').textContent='K '+fmt(totalUnpaid);

    if(!records.length){
      tbody.innerHTML=`<tr><td colspan="7" class="empty-state"><i class="fas fa-receipt"></i>No receipts yet — click "Add Receipt"</td></tr>`;
      return;
    }
    tbody.innerHTML='';
    records.forEach(r=>{
      const isPaid=r.status==='paid';
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td style="white-space:nowrap;color:var(--muted);font-size:0.82rem">${esc(r.date||'—')}</td>
        <td style="max-width:200px">${esc(r.description||'—')}</td>
        <td style="font-size:0.82rem;color:var(--muted)">${esc(r.reference||'—')}</td>
        <td>${esc(r.supplier||'—')}</td>
        <td><span class="amount-val">K ${fmt(r.amount)}</span></td>
        <td>
          <span class="badge ${isPaid?'badge-paid':'badge-unpaid'} toggle-status" data-id="${r.id}" data-status="${r.status}" title="Click to toggle">
            ${isPaid?'Paid':'Unpaid'}
          </span>
        </td>
        <td><div class="action-btns"><button class="icon-btn del-btn" data-id="${r.id}" title="Delete"><i class="fas fa-trash"></i></button></div></td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('.toggle-status').forEach(el=>{
      el.onclick=async()=>{
        const newStatus=el.dataset.status==='paid'?'unpaid':'paid';
        await update(ref(db,`cleanAccounts/${el.dataset.id}`),{status:newStatus});
      };
    });
    tbody.querySelectorAll('.del-btn').forEach(btn=>{
      btn.onclick=()=>{ if(confirm('Delete this receipt?')) remove(ref(db,`cleanAccounts/${btn.dataset.id}`)); };
    });
  });

  document.getElementById('addReceiptBtn').onclick=()=>{
    document.getElementById('rDate').value=new Date().toISOString().slice(0,10);
    ['rRef','rDesc','rSupplier','rAmount'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('rStatus').value='unpaid';
    document.getElementById('receiptModal').classList.add('open');
    setTimeout(()=>document.getElementById('rDate').focus(),100);
  };
  document.getElementById('receiptCancel').onclick=()=>document.getElementById('receiptModal').classList.remove('open');
  document.getElementById('receiptModal').addEventListener('click',e=>{if(e.target===document.getElementById('receiptModal'))document.getElementById('receiptModal').classList.remove('open');});

  document.getElementById('receiptSave').onclick=async()=>{
    const date=document.getElementById('rDate').value;
    const description=document.getElementById('rDesc').value.trim();
    const reference=document.getElementById('rRef').value.trim();
    const supplier=document.getElementById('rSupplier').value.trim();
    const amount=parseFloat(document.getElementById('rAmount').value)||0;
    const status=document.getElementById('rStatus').value;
    if(!date||!description||!supplier){alert('Please fill in Date, Description, and Supplier.');return;}
    await push(acctRef,{date,description,reference,supplier,amount,status,createdAt:Date.now()});
    document.getElementById('receiptModal').classList.remove('open');
  };

  setInterval(()=>window.parent?.postMessage({type:'reset_session_timer'},'*'),30000);
  document.addEventListener('click',()=>window.parent?.postMessage({type:'reset_session_timer'},'*'));
</script>
</body>
</html>
